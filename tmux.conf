# tmux.conf — sensible, dependency-free defaults for the devbox.
# Shipped as /etc/tmux.conf in the image (applies to everyone, survives redeploys
# since it lives in the image, not the volume). Override per-user in ~/.tmux.conf.
# Prefix is the default Ctrl-b unless you change it below.

#-- General ------------------------------------------------------------------
set -sg escape-time 10          # snappy vim/neovim mode switches (default is 500ms)
set  -g history-limit 50000     # deep scrollback
set  -g display-time 4000       # keep status messages up long enough to read
set  -g status-interval 5       # refresh the status line every 5s (default 15)
set  -g focus-events on          # let vim & co. react to terminal focus
# aggressive-resize intentionally OFF: it breaks the iTerm2 tmux (-CC) integration.
setw -g aggressive-resize off
set  -g status-keys emacs        # emacs editing at the tmux command prompt

#-- True color ---------------------------------------------------------------
# Needs the tmux-256color terminfo entry (package: ncurses-term).
set  -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

#-- Windows & panes ----------------------------------------------------------
set  -g base-index 1            # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set  -g renumber-windows on     # no gaps when a window closes
set  -g mouse on                # click panes/windows, drag borders, scroll

# Intuitive splits that inherit the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window   -c "#{pane_current_path}"
unbind '"'
unbind %

# Move between panes with Alt+arrow — no prefix needed.
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift+arrow — no prefix needed.
bind -n S-Left  previous-window
bind -n S-Right next-window

# Resize panes with prefix then H/J/K/L (repeatable: hold prefix, tap keys).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#-- Copy mode ----------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Push yanked text to your LOCAL clipboard over SSH via OSC 52
# (works in iTerm2, kitty, WezTerm, recent Terminal.app, VS Code terminal).
set -g set-clipboard on

#-- Convenience --------------------------------------------------------------
bind r source-file /etc/tmux.conf \; display "tmux config reloaded"

# Prefix stays Ctrl-b so Ctrl-a keeps working as start-of-line in your shell.
# Prefer screen-style Ctrl-a? Uncomment:
#   unbind C-b
#   set -g prefix C-a
#   bind C-a send-prefix

#-- Status bar ---------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=colour234,fg=colour245"
set -g status-left "#[bg=colour39,fg=colour234,bold] #S #[bg=colour234,fg=colour39] "
set -g status-left-length 30
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=colour39,fg=colour234,bold] #I:#W "
set -g status-right "#[fg=colour245]#H  %H:%M "
set -g status-right-length 40
