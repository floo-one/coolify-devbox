# documentation: https://github.com/floo-one/coolify-devbox
# slogan: A persistent SSH dev box running Claude Code, on your own Coolify server.
# category: development
# tags: devbox,ssh,claude-code,development,remote,tmux
# port: 9009

services:
  devbox:
    build: .
    # SSH. Published as a host TCP port so you can `ssh -p 2222 dev@<server>`.
    # Open 2222 in your cloud firewall. (Coolify's domain below is HTTP-only, for the
    # dev-server preview — it does not carry SSH.)
    ports:
      - "2222:22"
    environment:
      # --- Public dev-server preview (optional) --------------------------------
      # Coolify sees this magic var and generates a public HTTPS domain for port
      # 9009. NOTE (Coolify 4.1.x, git-based compose apps): the domain lands in the
      # SERVICE_FQDN_DEVBOX env var but is NOT always registered with the proxy —
      # if the URL doesn't route after the first deploy, set the app's Domains
      # field for service "devbox" to  https://<that-domain>:9009  (port included,
      # so Traefik picks 9009 over the also-exposed port 22) and redeploy.
      # Delete this line if you only ever preview via `ssh -L` port-forward.
      - SERVICE_FQDN_DEVBOX_9009
      # Basic-auth for that public URL. Coolify auto-generates the password (shown
      # in the app's env vars, never committed here) and the entrypoint turns it into
      # an in-container Caddy basic-auth gate. User defaults to "dev". Rotate the URL
      # password by regenerating SERVICE_PASSWORD_DEVBOX in Coolify + restart.
      # NOTE: the ${...} reference form is required — Coolify only auto-generates
      # SERVICE_USER_*/SERVICE_PASSWORD_* for interpolated references; a bare name
      # (which works for SERVICE_FQDN_*) is silently left empty.
      - SERVICE_USER_DEVBOX=${SERVICE_USER_DEVBOX}
      - SERVICE_PASSWORD_DEVBOX=${SERVICE_PASSWORD_DEVBOX}
      # Set to "true" to serve the dev URL with NO auth (anyone with the URL can
      # see whatever runs on the dev port). Default: auth on.
      - DEVBOX_PUBLIC=${DEVBOX_PUBLIC:-}
      # Which internal port your dev server listens on (Caddy proxies 9009 -> here).
      - DEVBOX_DEV_PORT=${DEVBOX_DEV_PORT:-3000}

      # --- SSH access ----------------------------------------------------------
      # Your SSH public key(s), one per line. Set this in Coolify's env vars.
      - AUTHORIZED_KEYS=${AUTHORIZED_KEYS}

      # --- Optional workstation auto-layout ------------------------------------
      # If set, the tmux tabs (dev/claude) open in this repo path on a cold start,
      # e.g. /home/dev/my-app (relative = under /home/dev). Leave empty for a plain box.
      - DEVBOX_PROJECT=${DEVBOX_PROJECT:-}
      # If set, the dev tab auto-runs this on a cold start, e.g. "pnpm dev".
      - DEVBOX_DEV_CMD=${DEVBOX_DEV_CMD:-}
    # Documents the dev-server port for Coolify's SERVICE_FQDN routing.
    expose:
      - "9009"
    volumes:
      - devhome:/home/dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  devhome:
