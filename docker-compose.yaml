# documentation: https://github.com/floo-one/coolify-devbox
# slogan: A persistent SSH dev box running Claude Code, on your own Coolify server.
# category: development
# tags: devbox,ssh,claude-code,development,remote,tmux
# port: 9009

services:
  devbox:
    build: .
    # SSH. Published as a host TCP port so you can `ssh -p 2222 dev@<server>`.
    # Open the port in your cloud firewall. (Coolify's domain below is HTTP-only, for
    # the dev-server preview — it does not carry SSH.) Running SEVERAL devboxes on one
    # server? Give each app a different DEVBOX_SSH_PORT (2222, 2223, ...) in its env.
    ports:
      - "${DEVBOX_SSH_PORT:-2222}:22"
    environment:
      # --- Public dev-server preview (optional) --------------------------------
      # No Coolify SERVICE_* magic vars here ON PURPOSE: they are built for one-click
      # service templates and misbehave on git-based compose apps (domain churn plus
      # a phantom "configuration changed — redeploy required" diff on every deploy).
      # The reliable path is boring:
      #   1. Set the app's Domains field ONCE to  https://<your-domain>:9009
      #      (the :9009 tells Traefik which container port to route — the container
      #      also exposes 22, so it can't infer it. Visitors never see the port.)
      #   2. Mirror the URL here so shells and dev servers know their public origin
      #      (exported as DEVBOX_URL / DEVBOX_FQDN in every SSH session):
      - DEVBOX_URL=${DEVBOX_URL:-}
      # Basic-auth for the public URL: set "user:password" to protect it; leave
      # EMPTY to serve it public (anyone with the URL sees your dev server).
      # Hashed at runtime by the entrypoint — no hash to maintain, no secret in git.
      - DEVBOX_AUTH=${DEVBOX_AUTH:-}
      # Which internal port your dev server listens on (Caddy proxies 9009 -> here).
      - DEVBOX_DEV_PORT=${DEVBOX_DEV_PORT:-3000}

      # --- SSH access ----------------------------------------------------------
      # Your SSH public key(s), one per line. Set this in Coolify's env vars.
      - AUTHORIZED_KEYS=${AUTHORIZED_KEYS}

      # --- Optional workstation auto-layout ------------------------------------
      # If set, the tmux tabs (dev/claude) open in this repo path on a cold start,
      # e.g. /home/dev/my-app (relative = under /home/dev). Leave empty for a plain box.
      - DEVBOX_PROJECT=${DEVBOX_PROJECT:-}
      # If set, the dev tab auto-runs this on a cold start, e.g. "pnpm dev".
      - DEVBOX_DEV_CMD=${DEVBOX_DEV_CMD:-}
    # The Caddy preview port Traefik routes the domain to (see Domains note above).
    expose:
      - "9009"
    volumes:
      - devhome:/home/dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  devhome:
